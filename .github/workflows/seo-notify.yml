# 主動推送指定頁給搜尋引擎（Google Indexing API + IndexNow）。
# 由每日大腦層 cloud routine 在改完內容後以 gh workflow run 觸發：
#   gh workflow run seo-notify.yml -f urls="https://folk.tw/a/ https://folk.tw/b/"
# 大腦層雲端出站受限＋無 Google 金鑰，故把「推送」這步交給有出站＋金鑰的 Action 做。
name: SEO Notify (push changed URLs)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '空白分隔的完整網址（Google + IndexNow 一起推）'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: seo-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
      GSC_SITE_URL: 'sc-domain:folk.tw'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: 一鍵雙推（Google + IndexNow）
        env:
          URLS: ${{ inputs.urls }}
        # notify.mjs 會把網址同時轉給 index-ping.mjs 與 indexnow-ping.mjs。
        # 任一支失敗只記錄、不中斷另一支（見 scripts/notify.mjs）。
        run: node scripts/notify.mjs $URLS
