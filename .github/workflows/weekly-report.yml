# 每週自動產 GA4＋GSC 週報，開成 GitHub Issue。
# 需設定（repo Settings → Secrets and variables → Actions）：
#   - Secret  GOOGLE_SA_KEY   ：服務帳號 JSON 金鑰之完整內容
#   （GA4_PROPERTY_ID / GSC_SITE_URL 已於下方 env 帶入，非機密）
name: Weekly Data Report

on:
  schedule:
    - cron: '0 1 * * 1' # 每週一 01:00 UTC（台灣 09:00）
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
      GA4_PROPERTY_ID: '542419964'
      GSC_SITE_URL: 'sc-domain:folk.tw'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 產生週報
        run: node scripts/weekly-data.mjs > report.md
      - name: 開成 Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "folk.tw 週報 · $(date -u +%Y-%m-%d)" \
            --body-file report.md \
            --label weekly-report || \
          gh issue create \
            --title "folk.tw 週報 · $(date -u +%Y-%m-%d)" \
            --body-file report.md
